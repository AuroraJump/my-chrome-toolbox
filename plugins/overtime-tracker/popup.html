<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header class="popup-header">
    <div>
      <h3>加班规则配置</h3>
      <p id="modeHint">加班 = 实际工时 − 目标工时 − 门槛</p>
    </div>
    <span class="version">v2.4.6</span>
  </header>

  <section class="card">
    <div class="section-title">工作日</div>
    <div class="field">
      <label>排班模式</label>
      <select id="scheduleMode">
        <option value="elastic">弹性 · 按总工时</option>
        <option value="fixed">固定 · 按下班时间</option>
      </select>
    </div>

    <div class="field" id="fixedFields">
      <label>上班 / 下班</label>
      <div class="time-row">
        <input type="time" id="workStartTime" value="09:00">
        <span>至</span>
        <input type="time" id="workEndTime" value="18:00">
      </div>
      <small>每日工时 <b id="dailyHoursDisplay">9h</b></small>
    </div>

    <div class="field" id="elasticFields" style="display:none">
      <label>每日目标工时</label>
      <div class="number-line">
        <input type="number" id="baseHours" min="0" max="24" step="0.5" value="9">
        <span>小时</span>
      </div>
    </div>

    <div class="field">
      <label>加班门槛</label>
      <div class="number-line">
        <input type="number" id="thresholdHours" min="0" max="12" step="0.5" value="2">
        <span>小时</span>
      </div>
      <small>延后超过门槛才计入加班</small>
    </div>
  </section>

  <section class="card">
    <div class="section-title">补贴</div>
    <div class="field">
      <label>交通补贴开始时间</label>
      <input type="time" id="subsidyStartTime" value="21:00">
      <small>工作日下班不早于此时间, 记 1 次</small>
    </div>
  </section>

  <section class="card">
    <div class="section-title">周末 / 节假日</div>
    <div class="split">
      <div class="field">
        <label>起步阈值</label>
        <div class="number-line">
          <input type="number" id="weekendThreshold" min="0" max="12" step="0.5" value="4">
          <span>h</span>
        </div>
      </div>

      <div class="field">
        <label>单日封顶</label>
        <div class="number-line">
          <input type="number" id="weekendMax" min="0" max="24" step="0.5" value="8">
          <span>h</span>
        </div>
      </div>
    </div>
    <small class="section-note">满 4 小时才计入, 单日时长封顶; 补贴最多 1 次</small>
  </section>

  <section class="card">
    <div class="section-title">显示与计算</div>
    <div class="split">
      <div class="field">
        <label>月度目标</label>
        <div class="number-line">
          <input type="number" id="targetHours" min="0" max="200" step="1" value="48">
          <span>h</span>
        </div>
      </div>

      <div class="field">
        <label>计算模式</label>
        <select id="ruleMode">
          <option value="user">我的规则</option>
          <option value="raw">页面原值</option>
        </select>
      </div>
    </div>
  </section>

  <div class="actions">
    <button id="save">保存配置</button>
    <button id="reset">↺ 恢复默认</button>
  </div>

  <div id="status"></div>

  <p class="hint">请假、调休、无打卡等特殊日默认不计加班。多月统计入口在考勤页浮窗内。</p>

  <script src="popup.js"></script>
</body>
</html>
